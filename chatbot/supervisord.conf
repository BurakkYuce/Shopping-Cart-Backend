[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid

[program:chainlit]
command=python -m chainlit run chainlit_app.py --port %(ENV_CHAINLIT_PORT)s --host 0.0.0.0 --headless
directory=/app
autostart=true
autorestart=true
stderr_logfile=/tmp/chainlit.err.log
stdout_logfile=/tmp/chainlit.out.log
environment=PYTHONUNBUFFERED="1"

[program:fastapi]
command=python -m uvicorn fastapi_app:app --host 0.0.0.0 --port %(ENV_FASTAPI_PORT)s
directory=/app
autostart=true
autorestart=true
stderr_logfile=/tmp/fastapi.err.log
stdout_logfile=/tmp/fastapi.out.log
environment=PYTHONUNBUFFERED="1"
