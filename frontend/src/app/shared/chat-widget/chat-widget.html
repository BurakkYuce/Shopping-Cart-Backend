<div class="chat-widget">
  @if (isOpen) {
  <div class="chat-window">
    <div class="chat-header">
      <h3>AI Assistant</h3>
      <button type="button" (click)="toggleChat()">✕</button>
    </div>

    <div class="chat-messages">
      @for (message of messages; track $index) {
      <div class="message" [class.user-message]="message.sender === 'user'"
        [class.ai-message]="message.sender === 'ai'">
        <p>{{ message.text }}</p>
      </div>
      }

      @if (isLoading) {
      <div class="message ai-message">
        <p>Analyzing...</p>
      </div>
      }
    </div>

    <div class="chat-input-area">
      <input type="text" [(ngModel)]="userInput" placeholder="Ask about products..." />
      <button type="button" (click)="sendMessage()">Send</button>
    </div>
  </div>
  } @else {
  <button class="chat-toggle-button" type="button" (click)="toggleChat()">
    Chat
  </button>
  }
</div>
