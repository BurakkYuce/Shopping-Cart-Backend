spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        format_sql: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
    refresh-expiration: 604800000
  datasets:
    path: ${DATASETS_PATH:/datasets/output/}
  dataloader:
    enabled: ${DATALOADER_ENABLED:true}
    seed-password: ${SEED_PASSWORD:changeme}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  chatbot:
    url: ${CHATBOT_URL:http://localhost:8002}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
