spring:
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    out-of-order: true
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        format_sql: false
  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
    refresh-expiration: 604800000
  datasets:
    path: ${DATASETS_PATH:/datasets/output/}
  dataloader:
    enabled: ${DATALOADER_ENABLED:true}
    seed-password: ${SEED_PASSWORD:changeme}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  chatbot:
    url: ${CHATBOT_URL:http://localhost:8002}
  mail:
    from: ${MAIL_FROM:noreply@datapulse.com}
    from-name: ${MAIL_FROM_NAME:DataPulse}
  app-base-url: ${APP_BASE_URL:http://localhost:4200}
  auth:
    email-verification:
      required: ${EMAIL_VERIFICATION_REQUIRED:true}
      token-ttl-hours: 24

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
