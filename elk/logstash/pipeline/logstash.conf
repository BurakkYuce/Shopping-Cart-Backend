input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Drop invalid/non-JSON lines (e.g. stray HTTP requests)
  if "_jsonparsefailure" in [tags] {
    drop {}
  }

  # Parse @timestamp from app field
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # Flatten nested request fields for easy Kibana querying
  if [request] {
    mutate {
      rename => {
        "[request][method]"          => "http_method"
        "[request][endpoint]"        => "endpoint"
        "[request][ip]"              => "client_ip"
        "[request][response_time_ms]" => "response_time_ms"
        "[request][status_code]"     => "status_code"
      }
      remove_field => ["request"]
    }
  }

  # Remove noise fields
  mutate {
    remove_field => ["@version", "thread_name", "level_value", "logger_name", "springAppName"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ecommerce-logs-%{+YYYY.MM.dd}"
  }
}
