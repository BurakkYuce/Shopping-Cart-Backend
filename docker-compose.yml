services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elastic}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - ./elk/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "9200:9200"
    networks:
      - elk-net
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:${ELASTIC_PASSWORD:-elastic} http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  logstash:
    image: logstash:8.11.0
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elastic}
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5001:5000/tcp"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-net
      - backend-net

  es-setup:
    image: curlimages/curl:latest
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elastic}
    entrypoint: >
      sh -c '
        echo "Setting kibana_system password...";
        curl -sf -u "elastic:$${ELASTIC_PASSWORD}" -X POST "http://elasticsearch:9200/_security/user/kibana_system/_password" -H "Content-Type: application/json" -d "{\"password\":\"$${ELASTIC_PASSWORD}\"}" && echo " done" || echo " failed";
      '
    networks:
      - elk-net

  kibana:
    image: kibana:8.11.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-elastic}
    volumes:
      - ./elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "5601:5601"
    depends_on:
      es-setup:
        condition: service_completed_successfully
    networks:
      - elk-net

  backend:
    build: ./backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ecommerce
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: prod
      SEED_PASSWORD: ${SEED_PASSWORD:-changeme}
      DATALOADER_ENABLED: "true"
      DATASETS_PATH: /datasets/output/
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost:5601
      CHATBOT_URL: http://chatbot:8002
    volumes:
      - /Users/burak/Desktop/demo-apps/datasets:/datasets:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      logstash:
        condition: service_started
    networks:
      - backend-net

  chatbot:
    build: ./chatbot
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ecommerce
      DB_USER: chatbot_reader
      DB_PASS: chatbot_reader_pass
      JWT_SECRET: ${JWT_SECRET}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MAX_SQL_ROWS: "500"
      SQL_RETRY_LIMIT: "3"
      CHAINLIT_PORT: "8001"
      FASTAPI_PORT: "8002"
    ports:
      - "8001:8001"
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

networks:
  backend-net:
    driver: bridge
  elk-net:
    driver: bridge

volumes:
  postgres_data:
  es_data:
